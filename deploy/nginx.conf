# /etc/nginx/sites-available/10.8.0.21
# After editing:
#   sudo ln -sf /etc/nginx/sites-available/10.8.0.21 /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d 10.8.0.21 -d 10.8.0.21:8080

# ──────────────────────────────────────────────────────────────
# Frontend (TanStack Start SSR via PM2 on 127.0.0.1:3000)
# ──────────────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name 10.8.0.21;

    # certbot will inject the 443 block & redirect here.
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name 10.8.0.21;

    # ssl_certificate / ssl_certificate_key — managed by certbot

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 25M;        # matches Directus upload limit

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               application/xml+rss application/atom+xml image/svg+xml;
    gzip_min_length 1024;

    # Cache built assets aggressively (hashed filenames)
    location /_build/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 30d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Health check (no logging noise)
    location = /api/health {
        access_log off;
        proxy_pass http://127.0.0.1:3000;
    }

    # SSR + server functions + everything else
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}

# ──────────────────────────────────────────────────────────────
# Directus backend (self-hosted on 127.0.0.1:8055)
# ──────────────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name 10.8.0.21:8080;
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name 10.8.0.21:8080;

    client_max_body_size 100M;       # uploads pass through here

    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        proxy_pass http://127.0.0.1:8055;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}